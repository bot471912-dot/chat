<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chat</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<style>
body{margin:0;font-family:Arial;background:#0d0d0d;color:#fff}
.banner{height:180px;background:url('https://github.com/bot471912-dot/chat/blob/main/RGB.png?raw=true') center/cover;display:flex;align-items:center;justify-content:center}
.banner h1{background:rgba(0,0,0,0.7);padding:10px 20px;border-radius:10px}
.layout{max-width:1000px;margin:auto;padding:20px}
.createPost{background:#111;padding:15px;border-radius:10px;width:300px;margin-bottom:20px}
.posts{margin-top:10px}
.post{background:#1a1a1a;padding:15px;margin:10px 0;border-radius:10px;position:relative}
.chatBox{position:fixed;bottom:20px;right:20px;width:300px;background:#111;padding:10px;border-radius:10px;box-shadow:0 0 10px #000}
.chatMessages{max-height:200px;overflow-y:auto;font-size:12px;margin-bottom:5px}
input,textarea{width:100%;margin-top:5px;padding:1px;background:#222;color:#fff;border:none}
button{margin-top:5px;padding:8px;width:100%;background:#333;color:#fff;border:none;cursor:pointer}
.login{max-width:300px;margin:50px auto;text-align:center}
</style>
</head>
<body>

<div id="loginPage" class="login">
<h2>Connexion</h2>
<input id="usernameInput" placeholder="Pseudo">
<button onclick="login()">Entrer</button>
</div>

<div id="app" style="display:none">
<div class="banner"><h1>Anonyme</h1></div>

<div class="layout">
<!-- CREATE POST TOP LEFT -->
<div class="createPost">
<h3>Créer un post</h3>
<textarea id="postInput" placeholder="Ton message..."></textarea>
<button onclick="addPost()">Poster</button>
</div>

<!-- POSTS FEED -->
<div id="postsPage" class="posts"></div>
</div>

<!-- CHAT BOTTOM RIGHT -->
<div class="chatBox">
<div id="chatMessages" class="chatMessages"></div>
<input id="chatInput" placeholder="Message chat">
<button onclick="sendChat()">Envoyer</button>
</div>
</div>

<script>
// ⚡ Supabase setup
const SUPABASE_URL = "https://ytrgbyulcscxrtfnxzgh.supabase.co";
const SUPABASE_KEY = "sb_publishable_Jgtz-TR6bDv5C8Zoxk-pWw_ITu_BGuG";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 🌟 Variables
let user = null;

// LOGIN
function login(){
  user = document.getElementById('usernameInput').value || 'Anonyme';
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadPosts();
  loadChat();
}

// POSTS
async function addPost(){
  const msg = document.getElementById('postInput').value;
  if(!msg) return;
  const { data, error } = await client.from('posts').insert([{ username: user, msg }]);
  if(error) console.error("Erreur addPost:", error);
  else document.getElementById('postInput').value='';
  loadPosts();
}

async function loadPosts(){
  const { data, error } = await client.from('posts').select('*').order('id', { ascending: false }).limit(100);
  if(error) return console.error("Erreur loadPosts:", error);
  const el = document.getElementById('postsPage');
  el.innerHTML = '';
  data.forEach(p=>{
    const d = document.createElement('div');
    d.className='post';
    d.innerHTML = `<b>${p.username}</b><p>${p.msg}</p>`;
    el.appendChild(d);
  });
}

// CHAT
async function sendChat(){
  const msg = document.getElementById('chatInput').value;
  if(!msg) return;
  const { data, error } = await client.from('chat').insert([{ username: user, msg }]);
  if(error) console.error("Erreur sendChat:", error);
  else document.getElementById('chatInput').value='';
  loadChat();
}

async function loadChat(){
  const { data, error } = await client.from('chat').select('*').order('id', { ascending: true }).limit(100);
  if(error) return console.error("Erreur loadChat:", error);
  const el = document.getElementById('chatMessages');
  el.innerHTML='';
  data.forEach(c=>{
    const d = document.createElement('div');
    d.innerHTML = `<b>${c.username}:</b> ${c.msg}`;
    el.appendChild(d);
  });
}

// 🔄 Auto refresh posts/chat toutes les 5s
setInterval(()=>{ if(user) { loadPosts(); loadChat(); } }, 5000);

</script>
</body>
</html>
